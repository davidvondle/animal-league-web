<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Animal League — Play</title>
<style>
  :root { --slot:#646464; }
  * { box-sizing:border-box; }
  body { margin:0; font-family:-apple-system,"Segoe UI",Roboto,sans-serif; background:#1b1b1f; color:#eee; }
  header { display:flex; align-items:center; gap:10px; padding:8px 14px; background:#111; }
  header b { font-size:15px; } #status { color:#9a9aa8; font-size:13px; }
  .controls { margin-left:auto; display:flex; gap:6px; }
  button { padding:7px 11px; background:#e0552e; color:#fff; border:none; border-radius:6px; font-weight:600; font-size:13px; cursor:pointer; }
  button.ghost { background:#2a2a33; }
  .stage { display:flex; flex-direction:column; align-items:center; gap:8px; padding:10px; }
  #boardbox { position:relative; height:min(70vh,92vw); aspect-ratio:2366/2233;
              background:center/contain no-repeat; border-radius:14px; flex:none; }
  .zone { position:absolute; display:flex; gap:3px; align-items:center; justify-content:center; }
  .zone.drop { outline:2px dashed transparent; border-radius:8px; }
  .zone.drop.over { outline-color:#ffd34d; background:rgba(255,211,77,.12); }
  .card { max-width:100%; max-height:100%; border-radius:6px; box-shadow:0 2px 6px rgba(0,0,0,.5); }
  .bench .card { height:96%; max-width:none; }
  .cardwrap { position:relative; height:100%; z-index:0; }  /* stacking context so attached (z-index:-1) sits behind the card, not behind the board */
  .hp { position:absolute; top:-6px; right:-6px; background:#e0552e; color:#fff; font-size:12px;
        font-weight:700; min-width:20px; height:20px; border-radius:10px; display:flex; align-items:center; justify-content:center; padding:0 4px; }
  .count { position:absolute; bottom:2px; right:2px; background:rgba(0,0,0,.7); color:#fff; font-size:12px;
           border-radius:8px; padding:0 6px; }
  #hand { display:flex; gap:6px; width:min(74vh,94vw); height:150px; background:#15151a; border-radius:10px; padding:8px;
          align-items:center; overflow-x:auto; }
  #hand .card { height:130px; max-width:none; cursor:grab; }
  #hand.over { outline:2px dashed #ffd34d; }
  h2 { font-size:11px; text-transform:uppercase; letter-spacing:.05em; color:#9a9aa8; margin:0 0 6px; }
  #logpanel { position:fixed; right:10px; bottom:10px; width:220px; background:rgba(21,21,26,.94); border-radius:10px; padding:8px 10px; z-index:30; }
  #log { font-size:12px; color:#cdd8d8; max-height:34vh; overflow:auto; }
  #tray { position:fixed; right:14px; top:58px; display:flex; flex-direction:column; gap:14px; z-index:25; }
  .token { width:54px; height:54px; cursor:pointer; transform-origin:100% 50%; transition:transform .42s cubic-bezier(.34,1.56,.5,1); }
  .token.flipped { transform:scale(2.7); z-index:40; }
  .flipper { position:relative; width:100%; height:100%; transform-style:preserve-3d; transition:transform .5s cubic-bezier(.34,1.4,.5,1); }
  .token.flipped .flipper { transform:rotateX(180deg); }
  .tface { position:absolute; inset:0; backface-visibility:hidden; }
  .tface img { width:100%; height:100%; display:block; }
  .tback { transform:rotateX(180deg); }
  .chip { position:absolute; width:24px; height:24px; cursor:grab; filter:drop-shadow(0 1px 2px rgba(0,0,0,.7)); }
  .chip.tl{top:3px;left:3px;} .chip.tr{top:3px;right:3px;} .chip.bl{bottom:3px;left:3px;} .chip.br{bottom:3px;right:3px;}
  .hpctl { position:absolute; top:3px; left:50%; transform:translateX(-50%); display:flex; align-items:center; gap:3px;
           background:rgba(0,0,0,.72); border-radius:11px; padding:1px 4px; color:#fff; font-size:12px; font-weight:700; line-height:1; z-index:3; }
  .hpctl button { display:none; width:16px; height:16px; padding:0; border:none; border-radius:50%; background:#e0552e; color:#fff; font-size:13px; cursor:pointer; }
  .cardwrap:hover .hpctl button { display:inline-flex; align-items:center; justify-content:center; }
  /* attached cards (energy) peek straight up behind the animal (reverse z = each card's top band shows); drag one off to detach */
  .attached { position:absolute; inset:0; z-index:-1; }
  .attached img { position:absolute; left:8%; width:84%; top:calc(-16% * var(--n));
    border-radius:5px; box-shadow:0 1px 4px rgba(0,0,0,.55); cursor:grab; }
  .attached img:hover { outline:2px solid #ffd34d; }
  .cardwrap .card { cursor:zoom-in; }
  /* click any card to zoom it in & read; the card + its energy grow to fit the viewport */
  #inspect { position:fixed; inset:0; background:rgba(0,0,0,.78); display:none; z-index:60;
    align-items:center; justify-content:center; padding:18px; box-sizing:border-box; cursor:zoom-out; }
  #inspect.show { display:flex; animation:inspectFade .18s ease; }
  #inspectbox { display:flex; flex-direction:column; align-items:center; gap:10px; min-width:0; min-height:0; max-width:100%; max-height:100%;
    animation:inspectGrow .26s cubic-bezier(.2,.7,.3,1); }
  #inspectbox .main { min-height:0; max-width:90vw; border-radius:12px; box-shadow:0 10px 36px rgba(0,0,0,.6); object-fit:contain; }
  #inspectbox .energies { display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:92vw; }
  #inspectbox .energies img { min-width:0; max-height:15vh; max-width:20vw; border-radius:8px; box-shadow:0 4px 14px rgba(0,0,0,.5); object-fit:contain; }
  @keyframes inspectFade { from { opacity:0; } to { opacity:1; } }
  @keyframes inspectGrow { from { transform:scale(.55); opacity:0; } to { transform:scale(1); opacity:1; } }
  .coin { width:82px; height:82px; cursor:pointer; perspective:600px; transition:transform .35s cubic-bezier(.34,1.5,.5,1); }
  .coin.flipping { transform:translateX(-72px) scale(1.7); z-index:50; }
  .coinflip { position:relative; width:100%; height:100%; transform-style:preserve-3d; }
  .cface { position:absolute; inset:0; width:100%; height:100%; backface-visibility:hidden; border-radius:50%; }
  .cback { transform:rotateY(180deg); }
  #log div { padding:3px 0; border-bottom:1px solid #2a2a33; }
  #peek { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:20; }
  #peekbox { background:#1f1f26; border-radius:12px; padding:16px; max-width:80vw; max-height:80vh; overflow:auto; }
  #peekbox .row { display:flex; flex-wrap:wrap; gap:8px; }
  #peekbox img { height:150px; border-radius:6px; cursor:pointer; }
  #confirm { position:fixed; inset:0; background:rgba(0,0,0,.6); display:none; align-items:center; justify-content:center; z-index:40; }
  #confirmbox { background:#1f1f26; border-radius:12px; padding:20px 22px; text-align:center; max-width:300px; }
  #confirmbox p { margin:0 0 16px; font-size:15px; color:#eee; }
  .confirmbtns { display:flex; gap:10px; justify-content:center; }
</style>
</head>
<body>
<header>
  <b>Animal League</b> <span id="status">loading…</span>
  <span class="controls">
    <button id="draw">Draw</button>
    <button id="shuffle" class="ghost">Shuffle</button>
    <button id="search" class="ghost">Search deck</button>
  </span>
</header>
<div class="stage">
  <div id="boardbox"></div>
  <div id="hand" class="hand" data-zone="hand"></div>
</div>
<div id="logpanel"><h2>Game log</h2><div id="log"></div></div>
<div id="tray"></div>
<div id="peek"><div id="peekbox"><h2 id="peektitle">Your deck — click a card to take it to hand</h2><div class="row" id="peekrow"></div><button id="peekclose" class="ghost" style="margin-top:10px">Close</button></div></div>
<div id="confirm"><div id="confirmbox"><p id="confirmmsg"></p><div class="confirmbtns"><button id="confirmok">OK</button><button id="confirmcancel" class="ghost">Cancel</button></div></div></div>
<div id="inspect"><div id="inspectbox"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SB_URL="https://nxrzzhqywbjafrsthhll.supabase.co", SB_KEY="sb_publishable_6Op8-KnLEngJ3YQxpLNtVw_8h3ndtkk";
const BACK = SB_URL + "/storage/v1/object/public/cards/assets/card-back.png";
const BOARD = SB_URL + "/storage/v1/object/public/cards/assets/board-2p.svg";
const token = new URLSearchParams(location.hash.slice(1)).get("token");
const sb = supabase.createClient(SB_URL, SB_KEY);
const $ = s => document.querySelector(s);

const ZW=2366, ZH=2233, CW=165, CH=238;
const P1 = { active:{x:1119,y:1354}, bench:{x:567,y:1863,w:1269,h:266}, deck:{x:1928,y:1538}, discard:{x:1928,y:1271} };
const PRIZES = [{x:281,y:1857},{x:281,y:1554},{x:281,y:1251}];
const STAD = {x:1476,y:1005};
const mir = (z)=>({x:ZW-z.x-(z.w||CW), y:ZH-z.y-(z.h||CH), w:z.w||CW, h:z.h||CH});
const pct = (z)=>`left:${z.x/ZW*100}%;top:${z.y/ZH*100}%;width:${(z.w||CW)/ZW*100}%;height:${(z.h||CH)/ZH*100}%`;

let gameId=null, subbed=false, mySeat=null, lastView=null, amPlayer=true;

function slot(id, z, drop){
  const d=document.createElement("div"); d.className="zone"+(drop?" drop":""); d.id=id;
  if(drop) d.dataset.zone = drop;
  d.style.cssText = pct(z);
  if(drop){
    d.addEventListener("dragover", e=>{e.preventDefault(); d.classList.add("over");});
    d.addEventListener("dragleave", ()=>d.classList.remove("over"));
    d.addEventListener("drop", e=>{e.preventDefault(); d.classList.remove("over");
      const m=JSON.parse(e.dataTransfer.getData("json"));
      if(m.kind==="card") move(m.from, drop, m.card);
      else if(m.kind==="attached") detach(m.hostZone, m.host, m.card, drop);});
  }
  return d;
}
function buildBoard(){
  const bb=$("#boardbox"); bb.style.backgroundImage=`url(${BOARD})`; bb.innerHTML="";
  // your zones (drop targets)
  bb.append(slot("you-active",P1.active,"active"), slot("you-bench",P1.bench,"bench"),
            slot("you-deck",P1.deck,"deck"), slot("you-discard",P1.discard,"discard"));
  $("#you-bench").style.justifyContent="flex-start"; $("#you-bench").style.padding="6px";
  PRIZES.forEach((p,i)=> bb.append(slot("you-prize"+i,p,null)));
  bb.append(slot("stadium",STAD,"stadium"));
  // click your (face-down) discard to search it and take a card back to hand
  $("#you-discard").style.cursor="pointer";
  $("#you-discard").addEventListener("click", async ()=>{
    if(!lastView?.you?.discard?.length) return;
    if(await askConfirm("Search discard pile?")) openSearch("Discard pile — click a card to take it to hand", lastView.you.discard, "discard");
  });
  // opponent zones (mirrored, not drop targets)
  bb.append(slot("opp-active",mir(P1.active),null), slot("opp-bench",mir(P1.bench),null),
            slot("opp-deck",mir(P1.deck),null), slot("opp-discard",mir(P1.discard),null));
  $("#opp-bench").style.justifyContent="flex-start"; $("#opp-bench").style.padding="6px";
  PRIZES.forEach((p,i)=> bb.append(slot("opp-prize"+i,mir(p),null)));
}
function cardEl(c, from){
  const w=document.createElement("div"); w.className="cardwrap";
  // click any card (yours or the opponent's) to zoom it in — with its energy — and read the text
  w.addEventListener("click", ev=>{ ev.stopPropagation(); inspectCard(c); });
  // attached cards (energy) peek straight up behind the animal, and travel with it.
  // drag any attached card onto a zone (e.g. discard) to detach it.
  if(c.attached && c.attached.length){ const at=document.createElement("div"); at.className="attached";
    c.attached.forEach((a,i)=>{ const ai=document.createElement("img"); ai.src=a.url; ai.title=a.name+" — drag to discard";
      ai.style.setProperty("--n", i+1); ai.style.zIndex=String(c.attached.length-i);  // reverse z: front card closest to animal
      if(from && amPlayer){ ai.draggable=true;
        ai.addEventListener("dragstart", e=>{ e.stopPropagation();
          e.dataTransfer.setData("json", JSON.stringify({kind:"attached", hostZone:from, host:c.id, card:a.id})); }); }
      at.append(ai); }); w.append(at); }
  const img=document.createElement("img"); img.className="card"; img.src=c.url; img.title=c.name;
  // a stadium card can only be moved by the player who owns it
  const canDrag = from && amPlayer && (from!=="stadium" || String(c.owner)===String(mySeat));
  if(canDrag){ img.draggable=true; img.style.cursor="grab";
    img.addEventListener("dragstart", e=>e.dataTransfer.setData("json", JSON.stringify({kind:"card",card:c.id,from}))); }
  if(from && amPlayer){
    w.addEventListener("dragover", e=>e.preventDefault());
    w.addEventListener("drop", e=>{ e.preventDefault(); e.stopPropagation();
      const m=JSON.parse(e.dataTransfer.getData("json"));
      if(m.kind==="token") addToken(from,c.id,m.type);
      else if(m.kind==="chip"){ const r=w.getBoundingClientRect();
        const corner=((e.clientY-r.top)<r.height/2?"t":"b")+((e.clientX-r.left)<r.width/2?"l":"r");
        setTokenCorner(from,c.id,m.idx,corner); }
      else if(m.kind==="card" && m.card!==c.id) attach(m.from,m.card,from,c.id); });  // drop a card ONTO a card → stack behind it
  }
  w.append(img);
  // HP counter (animals carry one): value always shown; hover reveals −/+ (step 10) on your own cards
  if(c.hp!=null){ const hc=document.createElement("div"); hc.className="hpctl";
    if(from && amPlayer){ const mn=document.createElement("button"); mn.textContent="−";
      mn.addEventListener("click", ev=>{ ev.stopPropagation(); setHP(from,c.id,Math.max(0,(c.hp||0)-10)); }); hc.append(mn); }
    const v=document.createElement("span"); v.className="hpval"; v.textContent=c.hp; hc.append(v);
    if(from && amPlayer){ const pl=document.createElement("button"); pl.textContent="+";
      pl.addEventListener("click", ev=>{ ev.stopPropagation(); setHP(from,c.id,(c.hp||0)+10); }); hc.append(pl); }
    w.append(hc); }
  if(c.tokens&&c.tokens.length){ const corners=["tl","tr","bl","br"];
    c.tokens.forEach((t,idx)=>{ const ty=t.type||t, corner=(t&&t.corner)||corners[idx%4];
      const ci=document.createElement("img"); ci.className="chip "+corner; ci.src=TOKMAP[ty]||""; ci.title=ty;
      if(from && amPlayer){ ci.draggable=true;
        ci.addEventListener("dragstart", e=>{ e.stopPropagation(); e.dataTransfer.setData("json", JSON.stringify({kind:"chip",idx})); });
        ci.addEventListener("click", ev=>{ ev.stopPropagation(); removeToken(from,c.id,idx); }); }
      w.append(ci); }); }
  return w;
}
function backs(n){ return Array.from({length:n}).map(()=>{const i=document.createElement("img");i.className="card";i.src=BACK;return i;}); }
function fill(id, cards, from){ const el=$(id); if(!el)return; el.innerHTML=""; (cards||[]).forEach(c=>el.append(cardEl(c,from))); }

const TT=SB_URL+"/storage/v1/object/public/cards/assets/tokens/";
const TOKENS=[
 {type:"confuse", front:TT+"confuse.svg",  back:TT+"confuse-back.svg"},
 {type:"burn",    front:TT+"burn.svg",     back:TT+"burn-back.svg"},
 {type:"paralyze",front:TT+"paralyze.svg", back:TT+"paralyze-back.svg"},
 {type:"poison",  front:TT+"poison.svg",   back:TT+"poison-back.svg"},
 {type:"sleep",   front:TT+"sleep.svg",    back:TT+"sleep-back.svg"},
];
const TOKMAP=Object.fromEntries(TOKENS.map(t=>[t.type,t.front]));
function buildTray(){ const tray=$("#tray"); tray.innerHTML="";
  const coin=document.createElement("div"); coin.className="coin"; coin.id="coin";
  coin.innerHTML=`<div class="coinflip"><img class="cface" src="${TT}coin-heads.png"><img class="cface cback" src="${TT}coin-tails.png"></div>`;
  coin.addEventListener("click", flipCoin); tray.append(coin);
  TOKENS.forEach(t=>{ const el=document.createElement("div"); el.className="token"; el.draggable=true; el.title=t.type;
    el.innerHTML=`<div class="flipper"><div class="tface"><img src="${t.front}"></div><div class="tface tback"><img src="${t.back}"></div></div>`;
    el.addEventListener("click",()=>el.classList.toggle("flipped"));
    el.addEventListener("dragstart",e=>e.dataTransfer.setData("json",JSON.stringify({kind:"token",type:t.type})));
    tray.append(el); });
}
const cardTokens=(zone,id)=>{ const src = zone==="stadium" ? (lastView&&lastView.shared&&lastView.shared.stadium) : (lastView&&lastView.you&&lastView.you[zone]); const c=(src||[]).find(x=>x.id===id); return (c&&c.tokens)||[]; };
const addToken=(zone,id,type)=>{ const cur=cardTokens(zone,id); update(zone,id,{tokens:[...cur,{type,corner:["tl","tr","bl","br"][cur.length%4]}]}); };
const removeToken=(zone,id,idx)=>{ const t=[...cardTokens(zone,id)]; t.splice(idx,1); update(zone,id,{tokens:t}); };
const setTokenCorner=(zone,id,idx,corner)=>{ const arr=cardTokens(zone,id).map(x=>typeof x==="string"?{type:x}:{...x}); if(!arr[idx])return; arr[idx].corner=corner; update(zone,id,{tokens:arr},true); };

async function refresh(){
  if(!token){$("#status").textContent="missing token";return;}
  const {data,error}=await sb.rpc("game_view",{p_token:token});
  if(error){$("#status").textContent="error: "+error.message;return;}
  gameId=data.game_id; mySeat=data.seat; lastView=data; amPlayer=(data.kind!=="spectator");
  $("#tray").style.display=amPlayer?"flex":"none"; $("#hand").style.display=amPlayer?"flex":"none";
  const _c=document.querySelector("header .controls"); if(_c) _c.style.display=amPlayer?"flex":"none";
  $("#status").textContent=`seat ${data.seat} · v${data.version}`;
  const you=data.you, opp=(data.opponents||[])[0]||{active:[],bench:[],discard:[],hand_count:0,deck_count:0,prizes_count:0};
  fill("#you-active",you.active,"active"); fill("#you-bench",you.bench,"bench");
  $("#you-deck").innerHTML=""; if(you.deck_count){$("#you-deck").append(backs(1)[0]); tag("#you-deck",you.deck_count);}
  $("#you-discard").innerHTML=""; if(you.discard?.length){ $("#you-discard").append(backs(1)[0]); tag("#you-discard",you.discard.length); }  // face-down; click to search
  PRIZES.forEach((p,i)=>{ const el=$("#you-prize"+i); el.innerHTML=""; const n=Math.min(2,Math.max(0,you.prizes_count-i*2)); if(n){el.append(backs(1)[0]); tag("#you-prize"+i,n);} });
  // opponent (public zones real; hidden as backs/counts)
  fill("#opp-active",opp.active); fill("#opp-bench",opp.bench);
  $("#opp-discard").innerHTML=""; if(opp.discard?.length){ $("#opp-discard").append(backs(1)[0]); tag("#opp-discard",opp.discard.length); }  // face-down
  $("#opp-deck").innerHTML=""; if(opp.deck_count){$("#opp-deck").append(backs(1)[0]); tag("#opp-deck",opp.deck_count);}
  PRIZES.forEach((p,i)=>{ const el=$("#opp-prize"+i); el.innerHTML=""; const n=Math.min(2,Math.max(0,opp.prizes_count-i*2)); if(n){el.append(backs(1)[0]); tag("#opp-prize"+i,n);} });
  fill("#stadium",data.shared?.stadium,"stadium");
  fill("#hand",you.hand,"hand");
  if(gameId && !subbed){ subbed=true;
    sb.channel("g"+gameId).on("postgres_changes",{event:"INSERT",schema:"public",table:"game_events",filter:`game_id=eq.${gameId}`},
      p=>{ if(p.new.text){ const d=document.createElement("div"); d.textContent=p.new.text; $("#log").prepend(d); } refresh(); }).subscribe(); }
}
function tag(sel,n){ const e=document.createElement("div"); e.className="count"; e.textContent=n; $(sel).append(e); }
async function action(a){ const {error}=await sb.rpc("game_action",{p_token:token,p_action:a}); if(error)alert(error.message); else refresh(); }
const move=(from,to,card)=>action({type:"move",from,to,card});
const update=(zone,card,patch,silent)=>action({type:"update_card",zone,card,patch,silent});
const attach=(from,card,zone,target)=>action({type:"attach",from,card,zone,target});  // stack `card` behind `target`
const setHP=(zone,id,hp)=>update(zone,id,{hp},true);  // silent: syncs to opponent, no log spam
const detach=(zone,host,att,to)=>action({type:"detach",zone,card:host,att,to});  // drag an attached card off → detaches to the drop zone
function inspectCard(c){  // zoom a card (+ its energy) to a readable size, fit within the viewport
  const box=$("#inspectbox"); box.innerHTML="";
  const main=document.createElement("img"); main.className="main"; main.src=c.url; main.alt=c.name||"";
  main.style.maxHeight = (c.attached && c.attached.length) ? "58vh" : "84vh";
  box.append(main);
  if(c.attached && c.attached.length){ const row=document.createElement("div"); row.className="energies";
    c.attached.forEach(a=>{ const i=document.createElement("img"); i.src=a.url; i.alt=a.name||""; row.append(i); }); box.append(row); }
  $("#inspect").classList.add("show");
}
let coinRot=0, coinBusy=false;
async function flipCoin(){
  if(coinBusy) return; coinBusy=true;
  const {data,error}=await sb.rpc("game_action",{p_token:token,p_action:{type:"coin"}});
  if(error){coinBusy=false; alert(error.message); return;}
  const tails=/TAILS/i.test(data.text);
  const coin=$("#coin"), flip=coin.querySelector(".coinflip");
  coin.classList.add("flipping");
  const base=coinRot+360*4, want=tails?180:0; coinRot=base+(((want-(base%360))%360)+360)%360;
  flip.style.transition="transform 1.15s cubic-bezier(.15,.6,.25,1)";
  flip.style.transform=`rotateY(${coinRot}deg)`;
  setTimeout(()=>{ coin.classList.remove("flipping"); refresh(); coinBusy=false; }, 1200);
}
$("#draw").onclick=()=>action({type:"draw"});
$("#shuffle").onclick=()=>action({type:"shuffle"});
function openSearch(title, cards, fromZone){
  $("#peektitle").textContent=title; $("#peekrow").innerHTML="";
  (cards||[]).forEach(c=>{ const i=document.createElement("img"); i.src=c.url; i.title=c.name;
    i.onclick=()=>{ move(fromZone,"hand",c.id); $("#peek").style.display="none"; }; $("#peekrow").append(i); });
  $("#peek").style.display="flex";
}
function askConfirm(msg){ return new Promise(res=>{ $("#confirmmsg").textContent=msg; $("#confirm").style.display="flex";
  $("#confirmok").onclick=()=>{ $("#confirm").style.display="none"; res(true); };
  $("#confirmcancel").onclick=()=>{ $("#confirm").style.display="none"; res(false); }; }); }
$("#search").onclick=async()=>{ const {data,error}=await sb.rpc("game_action",{p_token:token,p_action:{type:"peek"}});
  if(error)return alert(error.message); openSearch("Your deck — click a card to take it to hand", data.deck, "deck"); };
$("#peekclose").onclick=()=>$("#peek").style.display="none";
$("#inspect").addEventListener("click", ()=>$("#inspect").classList.remove("show"));  // click anywhere to dismiss the zoom

const hd=$("#hand");
hd.addEventListener("dragover", e=>{e.preventDefault(); hd.classList.add("over");});
hd.addEventListener("dragleave", ()=>hd.classList.remove("over"));
hd.addEventListener("drop", e=>{e.preventDefault(); hd.classList.remove("over");
  const m=JSON.parse(e.dataTransfer.getData("json"));
  if(m.kind==="card") move(m.from,"hand",m.card);
  else if(m.kind==="attached") detach(m.hostZone, m.host, m.card, "hand");});
buildTray(); buildBoard(); refresh();
</script>
</body>
</html>
