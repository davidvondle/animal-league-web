<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Animal League — Activity</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:#0e0e12; color:#eee; font-family:-apple-system,system-ui,sans-serif; padding:20px; }
  .card { background:#15151a; border-radius:14px; padding:24px 26px; max-width:440px; width:100%;
    box-shadow:0 10px 36px rgba(0,0,0,.5); }
  h1 { font-size:18px; margin:0 0 4px; }
  .sub { color:#9a9aa8; font-size:13px; margin:0 0 18px; }
  .row { display:flex; justify-content:space-between; gap:14px; padding:9px 0; border-bottom:1px solid #2a2a33; font-size:13px; }
  .row b { color:#9a9aa8; font-weight:500; }
  .row span { font-family:ui-monospace,SFMono-Regular,monospace; word-break:break-all; text-align:right; }
  #status { margin-top:18px; font-size:13px; line-height:1.5; }
  .ok { color:#5fd08a; } .err { color:#ff9b7a; } .muted { color:#9a9aa8; }
</style>
</head>
<body>
<div class="card">
  <h1>🎴 Animal League</h1>
  <p class="sub">Discord Activity · Phase 0 — pipeline check</p>
  <div class="row"><b>channel</b><span id="channel">…</span></div>
  <div class="row"><b>guild</b><span id="guild">…</span></div>
  <div class="row"><b>instance</b><span id="instance">…</span></div>
  <div id="status" class="muted">Connecting to Discord…</div>
</div>
<script type="module">
import { DiscordSDK } from "./vendor/discord-embedded-app-sdk.js";
const CLIENT_ID = "1385860888971710494";
const $ = s => document.querySelector(s);
const setStatus = (msg, cls) => { const el = $("#status"); el.textContent = msg; el.className = cls || ""; };
(async () => {
  if (!CLIENT_ID || CLIENT_ID.indexOf("__") === 0) {
    setStatus("⚠️ DISCORD_CLIENT_ID wasn't substituted at deploy time — set it in .env and redeploy.", "err");
    return;
  }
  try {
    const sdk = new DiscordSDK(CLIENT_ID);
    setStatus("Handshaking with Discord…", "muted");
    await sdk.ready();              // completes the RPC handshake; channel/guild/instance come from the launch params
    $("#channel").textContent  = sdk.channelId  || "(none)";
    $("#guild").textContent    = sdk.guildId    || "(none)";
    $("#instance").textContent = sdk.instanceId || "(none)";
    setStatus("✅ Connected — the activity pipeline works. Next: identity + the board.", "ok");
  } catch (e) {
    const msg = (e && e.message) ? e.message : String(e);
    setStatus("❌ " + msg + "  —  open this from a Discord voice channel (the “rocket” / activity launcher), not a normal browser tab.", "err");
  }
})();
</script>
</body>
</html>
